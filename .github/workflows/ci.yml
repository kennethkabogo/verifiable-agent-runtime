name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

jobs:
  # ── Struct integrity (fast, no toolchain needed) ───────────────────────────
  lint-struct:
    name: Zig struct lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify SecureLogger methods are inside the struct
        run: |
          # sealBundle, settleBundle, and computeTerminalDigestLocked must be
          # indented inside SecureLogger (4-space prefix).  If they appear at
          # column 0 they are free module-level functions and will fail to
          # compile because they use method-call syntax and the private hex()
          # helper that only exists in the struct's namespace.
          if grep -En '^(pub fn (sealBundle|settleBundle)|fn computeTerminalDigestLocked)' \
              src/runtime/shell.zig; then
            echo ""
            echo "ERROR: the above function(s) are defined at module scope."
            echo "They must be indented inside 'pub const SecureLogger = struct {'."
            echo "This branch is likely based on commits that predate the struct"
            echo "fix — rebase onto main to pick it up automatically."
            exit 1
          fi
          echo "OK: all SecureLogger methods correctly scoped inside the struct."

  # ── Zig build ──────────────────────────────────────────────────────────────
  build:
    name: Zig build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: zig-pkgs-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-pkgs-

      - name: Build
        run: zig build

      - name: Test (Zig)
        run: zig build test

  # ── Host proxy tests (pytest + moto) ──────────────────────────────────────
  test-host-proxy:
    name: Host proxy tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r src/host/requirements-dev.txt

      - name: Test
        run: pytest src/host/tests/ -v

  # ── Verifier tests (pytest + cryptography) ────────────────────────────────
  test-verifier:
    name: Verifier tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install cryptography cbor2 pytest

      - name: Test
        run: pytest src/agent/tests/ tests/ -v
